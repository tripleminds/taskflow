<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TaskFlow</title>
<!-- SheetJS for Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- jsPDF + autoTable for PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2d3f55;border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#app{min-height:100vh}
/* ── header ── */
.hdr{display:flex;align-items:center;padding:0 20px;height:54px;background:#1e293b;
  border-bottom:1px solid #2d3f55;position:sticky;top:0;z-index:100;gap:8px;
  flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.brand{display:flex;align-items:center;gap:7px;flex-shrink:0}
.brand-mark{color:#6366f1;font-size:18px}
.brand-text{font-weight:800;font-size:16px;letter-spacing:-.5px;color:#e2e8f0}
.tabs{display:flex;gap:2px;background:#162032;border-radius:8px;padding:3px;flex-shrink:0}
.tab-btn{padding:5px 14px;border-radius:6px;border:none;font-size:13px;font-weight:600;
  cursor:pointer;background:transparent;color:#4b6071;transition:all .15s}
.tab-btn.active{background:#1e293b;color:#e2e8f0;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tab-btn:hover{color:#e2e8f0}
.hdr-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-left:auto}
/* ── sync status ── */
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-badge{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;
  border:1px solid #2d3f55;font-size:11px;font-weight:600;color:#94a3b8;cursor:pointer;
  transition:background .15s;white-space:nowrap}
.sync-badge:hover{background:#162032}
/* ── buttons ── */
.gbtn{background:none;border:1px solid #2d3f55;padding:6px 10px;border-radius:8px;
  font-size:12px;font-weight:600;color:#94a3b8;white-space:nowrap;transition:background .15s}
.gbtn:hover{background:#162032}
.primary-btn{background:#6366f1;color:#fff;border:none;padding:8px 14px;border-radius:8px;
  font-size:13px;font-weight:700;white-space:nowrap;transition:filter .15s}
.primary-btn:hover{filter:brightness(1.1)}
.clear-btn{background:none;border:1px solid rgba(239,68,68,.4);padding:6px 10px;
  border-radius:8px;font-size:12px;font-weight:600;color:#ef4444;white-space:nowrap;transition:background .15s}
.clear-btn:hover{background:rgba(239,68,68,.1)}
/* ── export dropdown ── */
.export-wrap{position:relative}
.export-btn{background:none;border:1px solid rgba(74,222,128,.45);padding:6px 10px;
  border-radius:8px;font-size:12px;font-weight:600;color:#4ade80;white-space:nowrap;transition:background .15s}
.export-btn:hover{background:rgba(74,222,128,.08)}
.export-menu{position:absolute;top:calc(100% + 5px);right:0;background:#1e293b;
  border:1px solid #2d3f55;border-radius:10px;min-width:150px;box-shadow:0 8px 24px rgba(0,0,0,.4);
  z-index:200;overflow:hidden;animation:fadeUp .12s ease;display:none}
.export-menu.open{display:block}
.export-item{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:13px;
  color:#94a3b8;cursor:pointer;transition:background .12s;border:none;background:none;
  width:100%;text-align:left}
.export-item:hover{background:#162032;color:#e2e8f0}
.export-item-icon{font-size:15px;width:18px;text-align:center}
/* ── bulk bar ── */
.bulk-bar{display:flex;align-items:center;gap:8px;background:#1a243a;border:1px solid #334d6e;
  border-radius:9px;padding:8px 14px;margin-bottom:10px;animation:fadeUp .15s ease}
.bulk-count{font-size:13px;color:#94a3b8;flex:1}
.bulk-count strong{color:#e2e8f0}
.bulk-del-btn{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#f87171;
  font-size:12px;font-weight:700;padding:5px 12px;border-radius:7px;transition:all .15s}
.bulk-del-btn:hover{background:rgba(239,68,68,.28)}
.bulk-clr-btn{background:none;border:none;color:#4b6071;font-size:12px;padding:5px 8px;border-radius:7px}
.bulk-clr-btn:hover{color:#94a3b8}
/* ── main (70% centered) ── */
.main{width:70%;margin:0 auto;padding:18px 0}
/* ── filter row ── */
.filter-row{display:flex;gap:7px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.search-wrap{flex:1;min-width:160px;position:relative}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#4b6071;font-size:15px;pointer-events:none}
.search-inp{width:100%;padding:8px 10px 8px 30px;border-radius:8px;border:1px solid #2d3f55;
  font-size:13px;outline:none;background:#162032;color:#e2e8f0;transition:border-color .15s}
.ci{padding:7px 9px;border-radius:8px;border:1px solid #2d3f55;font-size:12px;
  background:#162032;color:#e2e8f0;cursor:pointer;outline:none;transition:border-color .15s}
.ci:focus,.search-inp:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.count-tag{font-size:11px;color:#4b6071;white-space:nowrap}
.sel-all-row{display:flex;align-items:center;gap:8px;padding:0 4px;margin-bottom:6px}
.sel-all-chk{width:15px;height:15px;accent-color:#6366f1;cursor:pointer}
.sel-all-lbl{font-size:12px;color:#4b6071;cursor:pointer;user-select:none}
.hint{text-align:center;font-size:11px;color:#4b6071;margin-top:4px;letter-spacing:.3px;user-select:none}
/* ── task list ── */
.task-list{display:flex;flex-direction:column;gap:6px}
.empty{text-align:center;padding:60px 20px;display:flex;flex-direction:column;align-items:center;gap:8px}
.empty-ico{font-size:40px}
.empty-txt{color:#4b6071;font-size:14px}
/* ── task row ── */
.trow{background:#1e293b;border-radius:11px;border:1.5px solid #253347;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
  transition:box-shadow .15s,transform .12s,opacity .15s,border-color .12s;
  animation:fadeUp .2s ease both;overflow:hidden}
.trow:hover{box-shadow:0 4px 14px rgba(0,0,0,.4)}
.trow.selected{border-color:#6366f1;background:#1a2745}
.trow.drag-over{border-color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,.25);transform:scale(1.003)}
.trow.dragging{opacity:.45;transform:scale(.985)}
.trow-inner{display:flex;align-items:flex-start;gap:9px;padding:11px 14px}
.task-chk{width:15px;height:15px;accent-color:#6366f1;cursor:pointer;flex-shrink:0;margin-top:4px}
.drag-handle{color:#4b6071;font-size:14px;cursor:grab;padding-top:3px;flex-shrink:0;user-select:none;line-height:1}
.status-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:none;
  font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:1px;transition:filter .15s;cursor:pointer}
.status-btn:hover{filter:brightness(.88)}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.row-body{flex:1;min-width:0}
.row-title-line{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:1px}
.row-title{font-size:14px;font-weight:600;flex:1;min-width:0;line-height:1.35;color:#e2e8f0}
.row-title.done{color:#4b6071;text-decoration:line-through}
.time-pill{font-size:11px;color:#94a3b8;background:#162032;padding:2px 7px;border-radius:10px;
  white-space:nowrap;flex-shrink:0;border:1px solid #2d3f55}
.meta-line{display:flex;gap:6px;margin-top:4px;align-items:center;flex-wrap:wrap}
.cat-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;border:1px solid;background:transparent}
.pri-tag{font-size:10px;font-weight:600}
.dim{font-size:10px;color:#4b6071}
.prog-track{height:2px;background:#253347;border-radius:1px;margin-top:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:1px;transition:width .3s}
.expand-body{margin-top:9px;padding-top:7px;border-top:1px dashed #253347}
/* subtasks in expanded view */
.sub-view-list{display:flex;flex-direction:column;gap:5px;margin-bottom:4px}
.sub-view-item{display:flex;gap:7px;align-items:center;group:true}
.sub-view-check{font-size:12px;flex-shrink:0}
.sub-view-txt{font-size:13px;flex:1}
.sub-view-del{background:none;border:none;color:#4b6071;font-size:11px;padding:1px 4px;
  border-radius:4px;opacity:0;transition:opacity .15s,color .1s;cursor:pointer}
.sub-view-item:hover .sub-view-del{opacity:1}
.sub-view-del:hover{color:#ef4444}
.note-txt{font-size:12px;color:#94a3b8;font-style:italic;background:#162032;border-radius:6px;
  padding:5px 9px;margin-top:7px;border:1px solid #253347}
.row-actions{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.act-btn{background:none;border:none;font-size:13px;color:#4b6071;padding:2px 4px;border-radius:4px;transition:color .1s;cursor:pointer}
.act-btn.edit:hover{color:#6366f1}
.act-btn.del:hover{color:#ef4444}
.expand-btn{background:none;border:none;font-size:11px;color:#4b6071;padding:2px 4px;border-radius:4px;cursor:pointer}
/* ── modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:500;padding:14px}
.modal-card{background:#1e293b;border-radius:14px;width:100%;max-width:500px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);display:flex;flex-direction:column;
  max-height:92vh;border:1px solid #2d3f55;animation:modalIn .18s ease}
.modal-head{display:flex;justify-content:space-between;align-items:center;
  padding:15px 20px;border-bottom:1px solid #2d3f55}
.modal-title{font-size:15px;font-weight:700;color:#e2e8f0}
.modal-close{background:none;border:none;font-size:18px;color:#4b6071;line-height:1;cursor:pointer}
.modal-body{padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.modal-foot{display:flex;justify-content:flex-end;gap:7px;padding:12px 20px;border-top:1px solid #2d3f55}
.field-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:#4b6071;margin-bottom:3px;display:block}
.field-inp{display:block;width:100%;padding:8px 11px;border:1px solid #2d3f55;border-radius:8px;
  font-size:13px;color:#e2e8f0;outline:none;background:#162032;transition:border-color .15s}
.field-inp:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dur-group{background:#162032;border:1px solid #2d3f55;border-radius:10px;padding:10px 12px}
.dur-group-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#4b6071;margin-bottom:8px}
.dur-hint{font-size:11px;color:#4b6071;margin-top:3px}
.sub-add-row{display:flex;gap:8px;margin-bottom:8px}
.sub-add-btn{background:#6366f1;color:#fff;border:none;width:38px;height:38px;border-radius:8px;
  font-size:18px;flex-shrink:0;transition:filter .15s;cursor:pointer}
.sub-add-btn:hover{filter:brightness(1.1)}
.sub-item-row{display:flex;align-items:center;gap:8px;background:#0f172a;border-radius:7px;
  padding:6px 9px;border:1px solid #253347;margin-bottom:5px}
.sub-chk-btn{background:none;border:1px solid #2d3f55;border-radius:5px;width:20px;height:20px;
  font-size:10px;flex-shrink:0;color:#4b6071;cursor:pointer}
.sub-chk-btn.done{color:#4ade80}
.sub-del-btn{background:none;border:none;color:#4b6071;font-size:12px;cursor:pointer}
.save-btn{background:#6366f1;color:#fff;border:none;padding:8px 16px;border-radius:8px;
  font-size:13px;font-weight:700;cursor:pointer;transition:filter .15s,opacity .15s}
.save-btn:hover{filter:brightness(1.1)}
.save-btn:disabled{opacity:.4;cursor:not-allowed}
/* ── cat modal ── */
.cat-modal-card{background:#1e293b;border-radius:14px;width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);border:1px solid #2d3f55;animation:modalIn .18s ease}
.palette{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pal-swatch{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s}
.pal-swatch.active{border-color:#6366f1}
.pal-swatch:hover{transform:scale(1.15)}
.cat-list{display:flex;flex-direction:column;gap:6px}
.cat-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#162032;border-radius:9px;border:1px solid #253347}
.cat-color-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.cat-name-lbl{flex:1;font-size:14px;color:#e2e8f0;font-weight:500}
.del-cat-btn{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:#f87171;
  font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;transition:all .15s;cursor:pointer}
.del-cat-btn:hover{background:rgba(239,68,68,.25);border-color:rgba(239,68,68,.6)}
.divider{border-top:1px solid #2d3f55;margin:4px 0}
/* ── sync modal ── */
.sync-modal-card{background:#1e293b;border-radius:14px;width:100%;max-width:480px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);border:1px solid #2d3f55;animation:modalIn .18s ease}
.sync-steps{counter-reset:step;display:flex;flex-direction:column;gap:10px}
.sync-step{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:#94a3b8}
.sync-step-num{width:22px;height:22px;border-radius:50%;background:#253347;color:#6366f1;
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.sync-code{font-family:monospace;background:#0f172a;border:1px solid #253347;padding:2px 6px;
  border-radius:4px;font-size:12px;color:#60a5fa}
.sync-status-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:9px;
  background:#162032;border:1px solid #253347;font-size:13px}
/* ── confirm ── */
.confirm-card{background:#1e293b;border-radius:14px;max-width:380px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.4);border:1px solid #2d3f55;
  padding:24px 24px 20px;text-align:center;animation:modalIn .18s ease}
.confirm-ico{font-size:28px;margin-bottom:12px}
.confirm-title{font-weight:700;font-size:15px;color:#e2e8f0;margin-bottom:6px}
.confirm-msg{font-size:13px;color:#94a3b8;margin-bottom:20px}
.danger-btn{background:#ef4444;color:#fff;border:none;padding:9px 20px;border-radius:9px;
  font-size:13px;font-weight:700;cursor:pointer;transition:filter .15s}
.danger-btn:hover{filter:brightness(1.1)}
/* ── toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;
  color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;
  box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap;border:1px solid #334155;
  animation:toastIn .2s ease;pointer-events:none}
/* ── dashboard ── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.kpi-card{background:#1e293b;border-radius:12px;padding:13px 16px;
  box-shadow:0 1px 3px rgba(0,0,0,.3);border:1px solid #2d3f55;display:flex;flex-direction:column;gap:4px}
.kpi-icon{font-size:20px}
.kpi-val{font-family:monospace;font-size:22px;font-weight:600;color:#e2e8f0;line-height:1}
.kpi-lbl{font-size:10px;color:#4b6071;text-transform:uppercase;letter-spacing:.5px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr 200px;gap:14px}
.dash-grid2{display:grid;grid-template-columns:1fr 2fr;gap:14px}
.dash-card{background:#1e293b;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.3);border:1px solid #2d3f55}
.dash-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#4b6071;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-lbl{font-size:12px;color:#94a3b8;width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:6px;background:#253347;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.bar-num{font-family:monospace;font-size:11px;color:#4b6071;width:18px;text-align:right}
.ring-wrap{position:relative;width:110px;height:110px}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:monospace;font-size:20px;font-weight:600;color:#10b981}
.ring-lbl{font-size:10px;color:#4b6071}
.ring-sub{font-size:12px;color:#94a3b8;text-align:center}
.sched-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #253347}
.sched-time{font-family:monospace;font-size:11px;color:#4b6071;width:44px;flex-shrink:0}
.sched-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sched-title{flex:1;font-size:13px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sched-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.cat-dash-card{border-radius:10px;padding:11px 13px;border:1px solid #253347}
.cat-dash-name{font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-dash-meta{display:flex;justify-content:space-between;font-size:11px;color:#4b6071;margin-bottom:6px}
.cat-dash-bar{height:3px;background:#253347;border-radius:2px}
.cat-dash-fill{height:100%;border-radius:2px}
.no-data{font-size:13px;color:#4b6071}
@media(max-width:700px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)!important}
  .dash-grid,.dash-grid2{grid-template-columns:1fr!important}
  .hdr{height:auto;padding:8px 12px}
  .two-col{grid-template-columns:1fr!important}
  .main{width:94%!important;padding:14px 0!important}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ══════════════════════════════════════════
   PERSISTENCE
══════════════════════════════════════════ */
const LS_TASKS="tf_tasks_v2",LS_CATS="tf_cats_v1",LS_SYNC="tf_sync_cfg";
const lsGet=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

/* ══════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════ */
const DEFAULT_CATS=[
  {name:"Administrative",color:"#6366f1"},{name:"Meeting",color:"#f59e0b"},
  {name:"Development",color:"#10b981"},{name:"Personal",color:"#ec4899"},
  {name:"Support",color:"#3b82f6"},{name:"Family",color:"#f97316"},
  {name:"Finance",color:"#14b8a6"},{name:"Spiritual",color:"#a855f7"},
  {name:"Technical",color:"#ef4444"},
];
const SAMPLE=[
  {id:"1",title:"Review Q2 budget report",category:"Finance",priority:"High",status:"In Progress",hours:2,weeks:0,time:"10:00",subtasks:[{id:"s1",title:"Check last year figures",done:true},{id:"s2",title:"Update projections",done:false}],note:""},
  {id:"2",title:"Team standup",category:"Meeting",priority:"Medium",status:"Todo",hours:0.5,weeks:0,time:"09:00",subtasks:[],note:""},

const cc=name=>(S.cats.find(c=>c.name===name)||{color:"#94a3b8"}).color;
const filtered=()=>S.tasks.filter(t=>

  (S.filterSt==="All"||t.status===S.filterSt)&&
  (S.search===""||t.title.toLowerCase().includes(S.search.toLowerCase()))
);
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const durStr=(h,w)=>{const p=[];if((w||0)>0)p.push(w+"w");if((h||0)>0)p.push(h+"h");return p.join(" ")||null;};

/* ══════════════════════════════════════════
   FIREBASE SYNC  (REST API + SSE)
══════════════════════════════════════════ */
const syncEndpoint=()=>{
  if(!S.dbUrl||!S.roomCode)return null;
  const base=S.dbUrl.replace(/\/$/,"");
  return `${base}/tf-${S.roomCode}.json`;
};

/* debounced write — prevents thrashing on rapid edits */
const syncWrite=()=>{
  if(!syncEndpoint())return;
  if(S.syncWriteTimer)clearTimeout(S.syncWriteTimer);
  S.syncWriteTimer=setTimeout(async()=>{
    const ep=syncEndpoint();if(!ep)return;
    try{
      await fetch(ep,{method:"PUT",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({tasks:S.tasks,cats:S.cats,ts:Date.now()})});
    }catch(e){S.syncStatus="error";render();}
  },400);
};

const syncConnect=()=>{
  const ep=syncEndpoint();if(!ep)return;
  if(S.eventSource){S.eventSource.close();S.eventSource=null;}
  S.syncStatus="connecting";render();
  /* Firebase SSE — fires on any change */
  const es=new EventSource(ep);
  es.addEventListener("put",e=>{
    try{
      const {data}=JSON.parse(e.data);
      if(data&&Array.isArray(data.tasks)){
        /* Only apply remote data if newer than local */
        const remoteTs=data.ts||0;
        const localTs=S._lastLocalWrite||0;
        if(remoteTs>localTs){
          S.tasks=data.tasks;
          if(data.cats&&Array.isArray(data.cats))S.cats=data.cats;
          persist();render();
        }
      }
    }catch{}
  });
  es.onopen=()=>{S.syncStatus="online";render();};
  es.onerror=()=>{S.syncStatus="error";render();};
  S.eventSource=es;
};

const syncDisconnect=()=>{
  if(S.eventSource){S.eventSource.close();S.eventSource=null;}
  S.syncStatus="offline";
  S.dbUrl="";S.roomCode="";
  lsSet(LS_SYNC,{dbUrl:"",roomCode:""});
  render();
};

/* wrap persist + sync */
const save=()=>{
  S._lastLocalWrite=Date.now();
  persist();
  syncWrite();
};

const cycleStatus=id=>{S.tasks=S.tasks.map(t=>t.id===id?{...t,status:SNEXT[t.status]}:t);save();render();};
const deleteOne=id=>{S.tasks=S.tasks.filter(t=>t.id!==id);S.selectedIds.delete(id);save();render();};
const deleteSelected=()=>{
  const n=S.selectedIds.size;
  S.tasks=S.tasks.filter(t=>!S.selectedIds.has(t.id));
  S.selectedIds=new Set();S.modal=null;save();
  showToast("🗑 "+n+" task"+(n!==1?"s":"")+" deleted");
};
const upsert=task=>{
  const i=S.tasks.findIndex(t=>t.id===task.id);
  S.tasks=i>=0?S.tasks.map(t=>t.id===task.id?task:t):[...S.tasks,task];
  save();render();
};
const clearDone=()=>{
  const n=S.tasks.filter(t=>t.status==="Done").length;
  S.tasks=S.tasks.filter(t=>t.status!=="Done");S.modal=null;save();
  showToast("🗑 "+n+" completed task"+(n!==1?"s":"")+" removed");
};
const reorder=(fId,tId)=>{
  const a=[...S.tasks],fi=a.findIndex(t=>t.id===fId),ti=a.findIndex(t=>t.id===tId);
  if(fi<0||ti<0)return;const[item]=a.splice(fi,1);a.splice(ti,0,item);
  S.tasks=a;save();render();
};
/* delete subtask directly from expanded view */
const delSubFromView=(taskId,subId)=>{
  S.tasks=S.tasks.map(t=>t.id===taskId?{...t,subtasks:t.subtasks.filter(s=>s.id!==subId)}:t);
  save();render();
};

            <div class="sync-step"><span class="sync-step-num">2</span>
              <span>In the database Rules tab, set both <span class="sync-code">.read</span> and <span class="sync-code">.write</span> to <span class="sync-code">true</span> and publish.</span></div>
            <div class="sync-step"><span class="sync-step-num">3</span>
              <span>Copy your database URL (looks like <span class="sync-code">https://my-app-rtdb.firebaseio.com</span>) and paste below.</span></div>
          </div>
          <div class="divider"></div>
          <div><label class="field-lbl">Firebase Realtime Database URL</label>
            <input class="field-inp" id="sync-db-inp" placeholder="https://your-project-default-rtdb.firebaseio.com"
              value="${esc(S.syncDbInput||S.dbUrl)}"/></div>
          <div><label class="field-lbl">Room Code <span style="font-weight:400;text-transform:none;color:#4b6071">(any word you choose — same on both devices)</span></label>
            <input class="field-inp" id="sync-room-inp" placeholder="e.g. myworkspace" value="${esc(S.syncRoomInput||S.roomCode)}"/></div>
          <div class="sync-status-row">
            <span style="width:9px;height:9px;border-radius:50%;background:${statusColor};flex-shrink:0"></span>
            <span style="font-size:13px;color:${statusColor}">${statusLabel}</span>
          </div>`}
      </div>
      <div class="modal-foot">
        <button class="gbtn" data-action="close">Close</button>
        ${!isConnected?`<button class="primary-btn" data-action="connect-sync">Connect &amp; Sync</button>`:""}
      </div>
    </div>
  </div>`;
};

/* ── confirm modals ── */
const confirmDoneHtml=()=>{
  const n=S.tasks.filter(t=>t.status==="Done").length;
  return `<div class="overlay" id="modal-overlay"><div class="confirm-card">
    <div class="confirm-ico">🗑</div>
    <p class="confirm-title">Clear all completed tasks?</p>
    <p class="confirm-msg">Permanently delete <strong style="color:#ef4444">${n} completed task${n!==1?"s":""}</strong>. Cannot be undone.</p>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="gbtn" data-action="close">Cancel</button>
      <button class="danger-btn" data-action="clear-done">Yes, delete all</button>
    </div></div></div>`;
};
const confirmBulkHtml=()=>{
  const n=S.selectedIds.size;
  return `<div class="overlay" id="modal-overlay"><div class="confirm-card">
    <div class="confirm-ico">🗑</div>
    <p class="confirm-title">Delete ${n} selected task${n!==1?"s":""}?</p>
    <p class="confirm-msg">Permanently delete <strong style="color:#ef4444">${n} task${n!==1?"s":""}</strong>. Cannot be undone.</p>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="gbtn" data-action="close">Cancel</button>
      <button class="danger-btn" data-action="del-sel">Yes, delete ${n}</button>
    </div></div></div>`;
};

/* ── dashboard ── */
const dashHtml=()=>{
  const tasks=S.tasks,tot=tasks.length;
  const dn=tasks.filter(t=>t.status==="Done").length;
  const ip=tasks.filter(t=>t.status==="In Progress").length;
  const th=tasks.reduce((a,t)=>a+(t.hours||0),0);
  const tw=tasks.reduce((a,t)=>a+(t.weeks||0),0);
  const pct=tot?Math.round(dn/tot*100):0;
  const bySt=STATUSES.map(s=>({l:s,n:tasks.filter(t=>t.status===s).length,c:SBADGE[s].c}));
  const byPr=PRIS.map(p=>({l:p,n:tasks.filter(t=>t.priority===p).length,c:PC[p]}));
  const byCat=S.cats.map(c=>({l:c.name,c:c.color,
    n:tasks.filter(t=>t.category===c.name).length,
    h:tasks.filter(t=>t.category===c.name).reduce((a,t)=>a+(t.hours||0),0),
    w:tasks.filter(t=>t.category===c.name).reduce((a,t)=>a+(t.weeks||0),0),
  })).filter(c=>c.n>0);
  const sched=tasks.filter(t=>t.time&&t.status!=="Done").sort((a,b)=>a.time.localeCompare(b.time));
  const bars=items=>items.map(({l,n,c})=>`<div class="bar-row">
    <span class="bar-lbl">${esc(l)}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${tot?n/tot*100:0}%;background:${c}"></div></div>
    <span class="bar-num">${n}</span></div>`).join("");
  const schedHtml=sched.length===0?`<p class="no-data">No timed tasks pending.</p>`:
    sched.slice(0,10).map(t=>{const col=cc(t.category),b=SBADGE[t.status];
      return `<div class="sched-row"><span class="sched-time">${esc(t.time)}</span>
        <span class="sched-dot" style="background:${col}"></span>
        <span class="sched-title">${esc(t.title)}</span>
        <span class="sched-badge" style="background:${b.bg};color:${b.c}">${esc(t.status)}</span></div>`;}).join("");
  const catCards=byCat.length===0?`<p class="no-data">No tasks yet.</p>`:
    byCat.map(c=>`<div class="cat-dash-card" style="background:#162032;border-left:3px solid ${c.c}">
      <div class="cat-dash-name">${esc(c.l)}</div>
      <div class="cat-dash-meta"><span>${c.n} task${c.n!==1?"s":""}</span>
        <span>${[c.h?""+c.h+"h":"",c.w?""+c.w+"w":""].filter(Boolean).join(" ")||"—"}</span></div>
      <div class="cat-dash-bar"><div class="cat-dash-fill" style="width:${tot?c.n/tot*100:0}%;background:${c.c}"></div></div>
    </div>`).join("");
  return `<div style="display:flex;flex-direction:column;gap:16px">
    <div class="kpi-grid">
      ${[{i:"📋",l:"Total",v:tot,col:"#6366f1"},{i:"✅",l:"Completed",v:dn,col:"#10b981"},
         {i:"⚡",l:"In Progress",v:ip,col:"#f59e0b"},{i:"⏱",l:"Total Hours",v:th+"h",col:"#3b82f6"},
         {i:"📅",l:"Total Weeks",v:tw+"w",col:"#a855f7"}].map(k=>
        `<div class="kpi-card" style="border-top:3px solid ${k.col}">
          <span class="kpi-icon">${k.i}</span><span class="kpi-val">${k.v}</span><span class="kpi-lbl">${k.l}</span>
        </div>`).join("")}
    </div>
    <div class="dash-grid">
      <div class="dash-card"><div class="dash-title">By Status</div>${bars(bySt)}</div>
      <div class="dash-card"><div class="dash-title">By Priority</div>${bars(byPr)}</div>
      <div class="dash-card" style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <div class="dash-title">Progress</div>
        <div class="ring-wrap">
          <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="42" fill="none" stroke="#253347" stroke-width="10"/>
            <circle cx="50" cy="50" r="42" fill="none" stroke="#10b981" stroke-width="10"
              stroke-dasharray="${pct*2.638} 263.8" stroke-linecap="round"/>
          </svg>
          <div class="ring-center"><span class="ring-pct">${pct}%</span><span class="ring-lbl">done</span></div>
        </div>
        <span class="ring-sub">${dn} of ${tot} completed</span>
      </div>
    </div>
    <div class="dash-grid2">
      <div class="dash-card"><div class="dash-title">Scheduled (pending)</div>${schedHtml}</div>
      <div class="dash-card"><div class="dash-title">By Category</div><div class="cat-grid">${catCards}</div></div>
    </div>
  </div>`;
};

/* ══════════════════════════════════════════
   MAIN RENDER
══════════════════════════════════════════ */
const _render=()=>{
  const doneN=S.tasks.filter(t=>t.status==="Done").length;
  const list=filtered();
  const selN=S.selectedIds.size;
  const allSel=list.length>0&&list.every(t=>S.selectedIds.has(t.id));
  const catOpts=['<option value="All">All Categories</option>',
    ...S.cats.map(c=>`<option value="${esc(c.name)}"${S.filterCat===c.name?" selected":""}>${esc(c.name)}</option>`)].join("");
  const stOpts=['<option value="All">All Statuses</option>',
    ...STATUSES.map(s=>`<option value="${esc(s)}"${S.filterSt===s?" selected":""}>${esc(s)}</option>`)].join("");

  /* sync indicator */
  const syncColor=S.syncStatus==="online"?"#4ade80":S.syncStatus==="connecting"?"#f59e0b":S.syncStatus==="error"?"#ef4444":"#4b6071";
  const syncLabel=S.syncStatus==="online"?"Synced":S.syncStatus==="connecting"?"Syncing…":S.syncStatus==="error"?"Sync Error":"Sync";

  const bulkBar=selN>0?`<div class="bulk-bar">
    <span class="bulk-count"><strong>${selN}</strong> task${selN!==1?"s":""} selected</span>
    <button class="bulk-del-btn" data-action="bulk-confirm">🗑 Delete Selected</button>
    <button class="bulk-clr-btn" data-action="clr-sel">✕ Deselect all</button>
  </div>`:"";

  const selAllRow=list.length>0?`<div class="sel-all-row">
    <input type="checkbox" class="sel-all-chk" id="sel-all" data-action="sel-all" ${allSel?"checked":""}/>
    <label class="sel-all-lbl" for="sel-all">Select all visible (${list.length})</label>
  </div>`:"";

  const listHtml=list.length===0
    ?`<div class="empty"><span class="empty-ico">📋</span><p class="empty-txt">No tasks found</p>
       <button class="primary-btn" data-action="add" style="margin-top:4px">+ Add your first task</button></div>`
    :list.map((t,i)=>taskRow(t,i*22)).join("")+`<p class="hint">⠿ Drag to reorder · hover subtasks to delete them</p>`;

  const mainHtml=S.view==="tasks"
    ?`<div class="filter-row">
        <div class="search-wrap"><span class="search-ico">⌕</span>
          <input class="search-inp" id="search-inp" placeholder="Search tasks…" value="${esc(S.search)}"/></div>
        <select class="ci" id="fcat">${catOpts}</select>
        <select class="ci" id="fst">${stOpts}</select>
        <span class="count-tag">${list.length} task${list.length!==1?"s":""}</span>
      </div>${bulkBar}${selAllRow}
      <div class="task-list" id="task-list">${listHtml}</div>`
    :dashHtml();

  const modalHtml=S.modal
    ?(S.modal.type==="add"||S.modal.type==="edit")?taskModalHtml()
    :S.modal.type==="cat"?catModalHtml()
    :S.modal.type==="sync"?syncModalHtml()
    :S.modal.type==="confirm-done"?confirmDoneHtml()
    :S.modal.type==="confirm-bulk"?confirmBulkHtml()
    :""
    :"";

  document.getElementById("app").innerHTML=`<div id="root">
    <header class="hdr">
      <div class="brand"><span class="brand-mark">✦</span><span class="brand-text">TaskFlow</span></div>
      <div class="tabs">
        <button class="tab-btn${S.view==="tasks"?" active":""}" data-action="view-tasks">Tasks</button>
        <button class="tab-btn${S.view==="dashboard"?" active":""}" data-action="view-dash">Dashboard</button>
      </div>
      <div class="hdr-right">
        <button class="sync-badge" data-action="open-sync">
          <span class="sync-dot" style="background:${syncColor}"></span>${syncLabel}
        </button>
        <div class="export-wrap">
          <button class="export-btn" data-action="toggle-export">⬇ Export ▾</button>
          <div class="export-menu${S.exportMenuOpen?" open":""}" id="export-menu">
            <button class="export-item" data-action="exp-excel"><span class="export-item-icon">📊</span>Excel (.xlsx)</button>
            <button class="export-item" data-action="exp-pdf">  <span class="export-item-icon">📄</span>PDF (.pdf)</button>
            <button class="export-item" data-action="exp-word"> <span class="export-item-icon">📝</span>Word (.doc)</button>
          </div>
        </div>
        <button class="gbtn" data-action="open-cat">⊕ Category</button>
        ${S.view==="tasks"&&doneN>0?`<button class="clear-btn" data-action="open-done-confirm">🗑 Clear Done (${doneN})</button>`:""}
        ${S.view==="tasks"?`<button class="primary-btn" data-action="add">+ Add Task</button>`:""}
      </div>
    </header>
    <main class="main">${mainHtml}</main>
    ${modalHtml}
    ${S.toast?`<div class="toast">${esc(S.toast)}</div>`:""}
  </div>`;
  bindEvents();
};

/* ══════════════════════════════════════════
   EVENTS
══════════════════════════════════════════ */
const bindEvents=()=>{
  const root=document.getElementById("root");if(!root)return;

  /* close export menu on outside click */
  document.addEventListener("click",e=>{
    if(S.exportMenuOpen&&!e.target.closest(".export-wrap")){
      S.exportMenuOpen=false;render();
    }
  },{once:true});

  root.addEventListener("click",e=>{
    const b=e.target.closest("[data-action]");if(!b)return;
    const a=b.dataset.action;
    if(a==="view-tasks")       {S.view="tasks";S.selectedIds=new Set();render();return;}
    if(a==="view-dash")        {S.view="dashboard";S.selectedIds=new Set();render();return;}
    if(a==="add")              {openAdd();return;}
    if(a==="open-cat")         {S.modal={type:"cat"};render();return;}
    if(a==="open-sync")        {S.syncDbInput=S.dbUrl;S.syncRoomInput=S.roomCode;S.modal={type:"sync"};render();return;}
    if(a==="open-done-confirm"){S.modal={type:"confirm-done"};render();return;}
    if(a==="bulk-confirm")     {S.modal={type:"confirm-bulk"};render();return;}
    if(a==="close")            {S.modal=null;render();return;}
    if(a==="toggle-export")    {e.stopPropagation();S.exportMenuOpen=!S.exportMenuOpen;render();return;}
    if(a==="exp-excel")        {S.exportMenuOpen=false;exportExcel();return;}
    if(a==="exp-pdf")          {S.exportMenuOpen=false;exportPDF();return;}
    if(a==="exp-word")         {S.exportMenuOpen=false;exportWord();return;}
    if(a==="clear-done")       {clearDone();return;}
    if(a==="del-sel")          {deleteSelected();return;}
    if(a==="clr-sel")          {S.selectedIds=new Set();render();return;}
    if(a==="cycle")            {cycleStatus(b.dataset.id);return;}
    if(a==="del")              {deleteOne(b.dataset.id);return;}
    if(a==="edit")             {openEdit(b.dataset.id);return;}
    if(a==="toggle-exp")       {toggleExp(b.dataset.id);return;}
    if(a==="del-sub-view")     {delSubFromView(b.dataset.tid,b.dataset.sid);return;}
    if(a==="save")             {saveTask();return;}
    if(a==="add-sub")          {addSub();return;}
    if(a==="tog-sub")          {togSub(b.dataset.sid);return;}
    if(a==="del-sub")          {delSub(b.dataset.sid);return;}
    if(a==="pal")              {setPal(b.dataset.color);return;}
    if(a==="add-cat")          {addCat();return;}
    if(a==="del-cat")          {delCat(b.dataset.name);return;}
    if(a==="connect-sync")     {doConnect();return;}
    if(a==="disconnect-sync")  {syncDisconnect();return;}
  });

  root.addEventListener("change",e=>{
    const el=e.target;
    if(el.dataset.action==="sel"){
      if(el.checked)S.selectedIds.add(el.dataset.id);
      else S.selectedIds.delete(el.dataset.id);
      render();return;
    }
    if(el.dataset.action==="sel-all"){
      filtered().forEach(t=>el.checked?S.selectedIds.add(t.id):S.selectedIds.delete(t.id));
      render();return;
    }
  });

  const ov=document.getElementById("modal-overlay");
  if(ov)ov.addEventListener("click",e=>{if(e.target===ov){S.modal=null;render();}});

  const si=document.getElementById("search-inp");
  if(si)si.addEventListener("input",e=>{S.search=e.target.value;render();});
  const fc=document.getElementById("fcat");if(fc)fc.addEventListener("change",e=>{S.filterCat=e.target.value;render();});
  const fs=document.getElementById("fst");if(fs)fs.addEventListener("change",e=>{S.filterSt=e.target.value;render();});

  const cp=document.getElementById("cat-clr");
  if(cp)cp.addEventListener("input",e=>{S.catColor=e.target.value;syncPal();});
  const ci=document.getElementById("cat-inp");
  if(ci){ci.addEventListener("input",e=>{S.catName=e.target.value;});
         ci.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addCat();}});}
  const ns=document.getElementById("m-newsub");
  if(ns)ns.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addSub();}});

  const ti=document.getElementById("m-title"),sb=document.getElementById("save-btn");
  if(ti&&sb){const upd=()=>{sb.disabled=!ti.value.trim();};ti.addEventListener("input",upd);upd();}

  /* sync modal inputs — live update state */
  const sdi=document.getElementById("sync-db-inp");
  if(sdi)sdi.addEventListener("input",e=>{S.syncDbInput=e.target.value;});
  const sri=document.getElementById("sync-room-inp");
  if(sri)sri.addEventListener("input",e=>{S.syncRoomInput=e.target.value;});

  bindDrag();
};

/* ── helpers ── */
const openAdd=()=>{
  S.editTask={id:uid(),title:"",category:S.cats[0]?.name||"Personal",
    priority:"Medium",status:"Todo",hours:1,weeks:0,time:"",subtasks:[],note:""};
  S.modal={type:"add"};render();
  setTimeout(()=>{const el=document.getElementById("m-title");if(el)el.focus();},50);
};
const openEdit=id=>{
  const t=S.tasks.find(t=>t.id===id);if(!t)return;
  S.editTask=JSON.parse(JSON.stringify({weeks:0,hours:0,...t}));
  S.modal={type:"edit"};render();
  setTimeout(()=>{const el=document.getElementById("m-title");if(el)el.focus();},50);
};
const toggleExp=id=>{S.expandedIds.has(id)?S.expandedIds.delete(id):S.expandedIds.add(id);render();};
const saveTask=()=>{
  const t=S.editTask;if(!t)return;
  const gv=id=>{const el=document.getElementById(id);return el?el.value:null;};
  const title=(gv("m-title")||"").trim();if(!title)return;
  const saved={...t,title,
    category:gv("m-cat")||t.category,priority:gv("m-pri")||t.priority,
    status:gv("m-status")||"Todo",
    hours:parseFloat(gv("m-hours"))||0,weeks:parseInt(gv("m-weeks"))||0,
    time:gv("m-time")||"",note:t.note||"",
  };
  const wasNew=S.modal.type==="add";
  upsert(saved);S.modal=null;
  showToast(wasNew?"✅ Task created":"✏️ Task updated");
};
const addSub=()=>{
  const inp=document.getElementById("m-newsub");
  if(!inp||!inp.value.trim())return;
  S.editTask.subtasks=[...S.editTask.subtasks,{id:uid(),title:inp.value.trim(),done:false}];
  inp.value="";rerenderSubs();
};
const togSub=sid=>{S.editTask.subtasks=S.editTask.subtasks.map(s=>s.id===sid?{...s,done:!s.done}:s);rerenderSubs();};
const delSub=sid=>{S.editTask.subtasks=S.editTask.subtasks.filter(s=>s.id!==sid);rerenderSubs();};
const rerenderSubs=()=>{
  const c=document.getElementById("sub-list");if(!c)return;
  c.innerHTML=S.editTask.subtasks.map(s=>`
    <div class="sub-item-row">
      <button class="sub-chk-btn${s.done?" done":""}" data-action="tog-sub" data-sid="${esc(s.id)}">${s.done?"✓":"○"}</button>
      <span style="flex:1;font-size:13px;color:${s.done?"#4b6071":"#94a3b8"};text-decoration:${s.done?"line-through":"none"}">${esc(s.title)}</span>
      <button class="sub-del-btn" data-action="del-sub" data-sid="${esc(s.id)}">✕</button>
    </div>`).join("");
};
const setPal=color=>{S.catColor=color;syncPal();};
const syncPal=()=>{
  document.querySelectorAll(".pal-swatch").forEach(sw=>sw.classList.toggle("active",sw.dataset.color===S.catColor));
  const cp=document.getElementById("cat-clr");if(cp)cp.value=S.catColor;
  const ab=document.querySelector("[data-action='add-cat']");if(ab)ab.style.background=S.catColor;
};
const addCat=()=>{
  const inp=document.getElementById("cat-inp");
  const name=inp?inp.value.trim():S.catName;if(!name)return;
  if(S.cats.find(c=>c.name.toLowerCase()===name.toLowerCase()))return;
  const cp=document.getElementById("cat-clr");
  S.cats=[...S.cats,{name,color:cp?cp.value:S.catColor}];
  S.catName="";save();render();
};
const delCat=name=>{S.cats=S.cats.filter(c=>c.name!==name);save();render();};

/* ── sync connect ── */
const doConnect=()=>{
  const db=(document.getElementById("sync-db-inp")||{value:S.syncDbInput}).value.trim();
  const rm=(document.getElementById("sync-room-inp")||{value:S.syncRoomInput}).value.trim();
  if(!db||!rm){showToast("⚠️ Enter both a database URL and room code");return;}
  S.dbUrl=db;S.roomCode=rm;
  lsSet(LS_SYNC,{dbUrl:db,roomCode:rm});
  syncConnect();
  render();
};

/* ══════════════════════════════════════════
   DRAG & DROP
══════════════════════════════════════════ */
const bindDrag=()=>{
  const list=document.getElementById("task-list");if(!list)return;
  list.addEventListener("dragstart",e=>{
    const row=e.target.closest(".trow");if(!row)return;
    if(e.target.classList.contains("task-chk")){e.preventDefault();return;}
    S.dragId=row.dataset.id;row.classList.add("dragging");e.dataTransfer.effectAllowed="move";
  });
  list.addEventListener("dragend",e=>{
    const row=e.target.closest(".trow");if(row)row.classList.remove("dragging");
    document.querySelectorAll(".trow.drag-over").forEach(r=>r.classList.remove("drag-over"));
    S.dragId=null;
  });
  list.addEventListener("dragover",e=>{
    e.preventDefault();e.dataTransfer.dropEffect="move";
    const row=e.target.closest(".trow");
    document.querySelectorAll(".trow.drag-over").forEach(r=>r.classList.remove("drag-over"));
    if(row&&row.dataset.id!==S.dragId)row.classList.add("drag-over");
  });
  list.addEventListener("dragleave",e=>{const row=e.target.closest(".trow");if(row)row.classList.remove("drag-over");});
  list.addEventListener("drop",e=>{
    e.preventDefault();
    const row=e.target.closest(".trow");if(!row)return;
    row.classList.remove("drag-over");
    if(S.dragId&&S.dragId!==row.dataset.id)reorder(S.dragId,row.dataset.id);
  });
};

/* ── auto-reconnect on load if credentials saved ── */
if(S.dbUrl&&S.roomCode)syncConnect();

render();
</script>
